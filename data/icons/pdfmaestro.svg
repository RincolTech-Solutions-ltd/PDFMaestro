<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#2A4E80"/>
      <stop offset="100%" stop-color="#122336"/>
    </linearGradient>
    <linearGradient id="batonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight at top -->
  <ellipse cx="256" cy="60" rx="180" ry="40" fill="white" opacity="0.05"/>

  <!-- Document shadow (depth effect) -->
  <rect x="175" y="112" width="210" height="278" rx="18" fill="#000" opacity="0.28" filter="url(#shadow)"/>

  <!-- Main document body -->
  <rect x="155" y="92" width="210" height="278" rx="18" fill="#FFFFFF"/>

  <!-- Folded corner (top-right dog-ear) -->
  <path d="M313 92 L365 92 L365 144 Z" fill="#D0D9EE"/>
  <path d="M313 92 L313 144 L365 144" fill="none" stroke="#B4C0D8" stroke-width="2.5"/>

  <!-- Text line stubs on document -->
  <rect x="181" y="172" width="116" height="11" rx="5.5" fill="#B4BFCF"/>
  <rect x="181" y="198" width="152" height="11" rx="5.5" fill="#B4BFCF"/>
  <rect x="181" y="224" width="94"  height="11" rx="5.5" fill="#B4BFCF"/>
  <rect x="181" y="250" width="140" height="11" rx="5.5" fill="#B4BFCF"/>
  <rect x="181" y="276" width="108" height="11" rx="5.5" fill="#B4BFCF"/>

  <!-- ── Conductor's baton ── -->
  <!-- Shaft -->
  <line x1="96" y1="438" x2="408" y2="126"
        stroke="url(#batonGrad)" stroke-width="22" stroke-linecap="round"/>

  <!-- Handle bulge (bottom-left) -->
  <ellipse cx="96" cy="438" rx="26" ry="26" fill="#A07010"/>
  <ellipse cx="96" cy="438" rx="18" ry="18" fill="#E8C040"/>
  <ellipse cx="91" cy="433" rx="6"  ry="6"  fill="#FFF0A0" opacity="0.6"/>

  <!-- Tip glow (top-right) -->
  <circle cx="408" cy="126" r="20" fill="#F5D060" filter="url(#glow)"/>
  <circle cx="408" cy="126" r="11" fill="#FFFACD"/>

  <!-- Four-point star at tip -->
  <path d="M408 106 L411 120 L425 123 L411 126 L408 140 L405 126 L391 123 L405 120 Z"
        fill="#FFE066" opacity="0.9"/>
</svg>
